<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - ISP Portal</title>
    <link rel="stylesheet" href="../css/captive-portal.css">
    <link rel="icon" href="../assets/images/favicon.ico">
</head>
<body class="portal-body">
    <div class="portal-container">
        <div class="portal-box">
            <div class="portal-header">
                <img src="../assets/images/logo.svg" alt="ISP Logo" height="50">
                <h1>Welcome Back</h1>
                <p>Login to manage your account</p>
            </div>
            
            <form id="login-form" class="portal-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
            <div class="portal-footer">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p class="test-creds">Test: demo@isp.com / password123</p>
            </div>
        </div>
        
        <div class="portal-sidebar">
            <div class="sidebar-content">
                <h2>Account Features</h2>
                <ul>
                    <li>📊 View your usage</li>
                    <li>💳 Pay invoices</li>
                    <li>📄 Download receipts</li>
                    <li>⚡ Upgrade package</li>
                    <li>🔔 Support tickets</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/captive-portal.js"></script>
</body>
</html>
